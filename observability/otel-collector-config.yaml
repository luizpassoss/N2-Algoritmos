receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 2s

exporters:
  # Métricas -> expostas para o Prometheus fazer scrape
  prometheus:
    endpoint: 0.0.0.0:8889
    # mantém os nomes das métricas estáveis (sem sufixos de unidade automáticos)
    add_metric_suffixes: false
    resource_to_telemetry_conversion:
      enabled: true

  # Traces -> Tempo (via OTLP gRPC)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logs -> Loki (via OTLP HTTP nativo do Loki)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # Saída no log do próprio collector (debug)
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]
