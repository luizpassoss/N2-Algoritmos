global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Métricas exportadas pelo OpenTelemetry Collector
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Métricas internas do próprio Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
